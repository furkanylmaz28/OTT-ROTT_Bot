<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#26a69a"/>
      <stop offset="100%" stop-color="#2962ff"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- OTT trend line -->
  <path d="M 60 380 L 140 320 L 220 360 L 300 220 L 380 260 L 460 120"
        stroke="url(#line)" stroke-width="22" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- TOTT bands (kesik) -->
  <path d="M 60 410 L 140 350 L 220 390 L 300 250 L 380 290 L 460 150"
        stroke="#26a69a" stroke-width="6" fill="none" opacity="0.5"
        stroke-dasharray="14 12" stroke-linecap="round"/>
  <path d="M 60 350 L 140 290 L 220 330 L 300 190 L 380 230 L 460 90"
        stroke="#ef5350" stroke-width="6" fill="none" opacity="0.5"
        stroke-dasharray="14 12" stroke-linecap="round"/>

  <!-- Signal dots -->
  <circle cx="220" cy="360" r="14" fill="#26a69a" stroke="#0d1117" stroke-width="4"/>
  <circle cx="380" cy="260" r="14" fill="#ef5350" stroke="#0d1117" stroke-width="4"/>

  <!-- Text: OTT -->
  <text x="256" y="475" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="64" font-weight="800"
        fill="#d1d4dc" letter-spacing="6">OTT</text>
</svg>

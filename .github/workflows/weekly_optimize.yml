name: Weekly Optimize

on:
  # Her Pazar UTC 23:00 = Türkiye Pazartesi 02:00
  # Hafta sonu boyunca piyasalar kapalı, Pazartesi sabah taze parametre.
  schedule:
    - cron: "0 23 * * 0"
  # Manuel tetiklenebilir (GitHub Actions sekmesinde "Run workflow")
  workflow_dispatch:

# GITHUB_TOKEN'a push yetkisi ver (per_symbol_params.json commit'i için)
permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Repo'yu checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: TradingView credentials .env'e yaz (geçici)
        env:
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        run: |
          echo "TV_USERNAME=$TV_USERNAME" > .env
          echo "TV_PASSWORD=$TV_PASSWORD" >> .env

      - name: Tüm sembolleri yeniden optimize et
        run: python per_symbol_optimize.py

      - name: .env'i sil (güvenlik)
        if: always()
        run: rm -f .env

      - name: Sonuçları commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add per_symbol_params.json
          if git diff --staged --quiet; then
            echo "Değişiklik yok, commit atlandı."
          else
            git commit -m "auto: haftalık optimize $(date -u '+%Y-%m-%d')"
            # Aradan başka push gelmiş olabilir → rebase ile birleştir
            git pull --rebase origin main
            git push
          fi

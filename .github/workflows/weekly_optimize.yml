name: Periodic Optimize

on:
  # Her 6 saatte bir (UTC: 00:00, 06:00, 12:00, 18:00)
  # = Türkiye 03:00, 09:00, 15:00, 21:00
  schedule:
    - cron: "0 */6 * * *"
  # Manuel tetiklenebilir (GitHub Actions sekmesinde "Run workflow")
  workflow_dispatch:

# GITHUB_TOKEN'a push yetkisi ver (per_symbol_params.json commit'i için)
permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Repo'yu checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: TradingView credentials .env'e yaz (geçici)
        env:
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        run: |
          echo "TV_USERNAME=$TV_USERNAME" > .env
          echo "TV_PASSWORD=$TV_PASSWORD" >> .env

      - name: Tüm sembolleri yeniden optimize et
        run: python per_symbol_optimize.py

      - name: .env'i sil (güvenlik)
        if: always()
        run: rm -f .env

      - name: Sonuçları commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add per_symbol_params.json
          git diff --staged --quiet || git commit -m "auto: haftalık optimize $(date -u '+%Y-%m-%d')"
          git push

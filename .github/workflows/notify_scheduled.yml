name: Scheduled Notify

# notify_scheduled.py — saate göre BIST/NASDAQ konsensüs/morning/scan bildirimleri.
# Script kendisi şu anki TR saatine göre hangi taramayı yapacağına karar verir.
# Tüm UTC saatleri (TR-3, DST yok):
#
#   TR Saati    UTC         Görev
#   ---------   ---         --------------------
#   10:10       07:10       BIST Morning
#   10:30       07:30       BIST Scan
#   11:00       08:00       BIST Konsensüs
#   12:10       09:10       BIST Morning
#   12:30       09:30       BIST Scan
#   14:00       11:00       BIST Konsensüs
#   15:10       12:10       BIST Morning
#   15:30       12:30       BIST Scan
#   16:40       13:40       NASDAQ Morning
#   17:00       14:00       BIST Konsensüs + NASDAQ Scan
#   17:10       14:10       BIST Morning
#   17:30       14:30       BIST Scan + NASDAQ Konsensüs
#   18:40       15:40       NASDAQ Morning
#   19:00       16:00       NASDAQ Scan
#   20:30       17:30       NASDAQ Konsensüs
#   20:40       17:40       NASDAQ Morning
#   21:00       18:00       NASDAQ Scan
#   22:00       19:00       NASDAQ Konsensüs
#   22:40       19:40       NASDAQ Morning
#   23:00       20:00       NASDAQ Scan

on:
  # DEVRE DIŞI (2026-07-10): eski BIST/NASDAQ konsensüs sinyalleri — edge'i olmadığı
  # kanıtlandı (26yıl OOS test), BIST_TrendFilter ile değiştirildi. Otomatik cron KAPALI;
  # Telegram karmaşasını önlemek için. Sadece elle tetiklenebilir (workflow_dispatch).
  # schedule:
  #   - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test modu (zorla BIST+NASDAQ tara, saat bakma)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write   # notify_state_scheduled.json commit için (spam koruması persist)

# Aynı anda iki çalışma olmasın
concurrency:
  group: notify-scheduled
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Repo'yu checkout
        uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Secrets'ı .env'e yaz (geçici)
        env:
          TV_USERNAME:        ${{ secrets.DATA_TOPLAMA_USERNAME }}
          TV_PASSWORD:        ${{ secrets.DATA_TOPLAMA_SIFRE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "TV_USERNAME=$TV_USERNAME"               >  .env
          echo "TV_PASSWORD=$TV_PASSWORD"               >> .env
          echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> .env
          echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID"     >> .env

      - name: Saate göre tarama + Telegram bildirim
        env:
          WORKFLOW_TEST: ${{ inputs.test_mode == 'true' && '1' || '0' }}
        run: python notify_scheduled.py

      - name: Günlük konsolide rapor (TR 18:30, idempotent)
        run: python daily_report.py --cron || true

      - name: Borsa Müdürü — ekip raporu (akıllı kadans, değişince)
        run: python borsa_mudur.py --cron || true

      - name: .env'i sil (güvenlik)
        if: always()
        run: rm -f .env

      - name: State + canlı performans verisini commit et
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # notify_state (spam koruması) + forward-validation (OTT) + long-only (kanıtlanmış sistem)
          # ÖNEMLİ: dosyaları TEK TEK ekle. "git add a b yok.json" → tüm komut çöker,
          # HİÇBİRİ staged olmaz (atomik). daily_report_state/borsa_mudur_state koşullu
          # oluşur (çoğu koşuda yok) → eskiden tüm commit'i kilitliyordu (26 Haz'da durdu).
          for f in notify_state_scheduled.json live_positions.json live_trades.json lo_positions.json lo_trades.json lo_breadth.json cg_positions.json cg_trades.json daily_report_state.json borsa_mudur_state.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --staged --quiet; then
            echo "Değişiklik yok."
          else
            git commit -m "auto: state + canlı performans $(date -u '+%H:%M')"
            # ROBUST PUSH: uzaktan ilerlemişse rebase et; DATA çakışmasında cron'unki
            # (yeni pozisyonlar) kazansın (-X theirs = uygulanan commit). 3 deneme.
            pushed=0
            for i in 1 2 3; do
              git fetch origin main
              if git rebase -X theirs origin/main; then
                if git push; then echo "push OK ($i)"; pushed=1; break; fi
              else
                git rebase --abort || true
              fi
              sleep 4
            done
            [ "$pushed" = "1" ] || echo "push başarısız (sonraki koşu tekrar dener)"
          fi
